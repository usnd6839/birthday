<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐！</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a, #000); 
            color: white; overflow: hidden;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }
        #overlay {
            position: fixed; inset: 0; background: #000;
            z-index: 100; display: flex; align-items: center; justify-content: center;
        }
        #start-btn {
            padding: 18px 45px; font-size: 22px; cursor: pointer;
            border-radius: 50px; border: none; font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        h1 { font-size: 10vw; margin: 0; z-index: 10; animation: shake 1s infinite; display: none; color: #fff; }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            75% { transform: rotate(-2deg); }
        }
        .msg {
            font-size: 24px; color: #ffd700; margin-top: 25px;
            width: 85%; line-height: 1.8; z-index: 10; font-weight: bold;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
        }
        .emoji { position: absolute; bottom: -60px; font-size: 35px; z-index: 1; pointer-events: none; }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-115vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body onclick="forcePlay()">

    <div id="overlay">
        <button id="start-btn" onclick="startParty(event)">🎂 点我开启专属好运✨</button>
    </div>

    <h1 id="header">🎂 生日快乐！</h1>
    <div class="msg" id="msg"></div>

    <audio id="bgm" loop preload="auto">
        <source src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTdvT19..." type="audio/wav">
        <source src="https://actions.google.com/sounds/v1/foley/wind_chime_fast.ogg" type="audio/ogg">
    </audio>

<script>
    // 给姐的专属文案
    const text = "最亲爱的老姐：<br>猜到这是什么了吗？<br>生日快乐哈哈！😂<br>天天开心！✨🎁";
    let i = 0;
    let isPlaying = false;

    function startParty(e) {
        if(e) e.stopPropagation();
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('header').style.display = 'block';
        
        const audio = document.getElementById('bgm');
        audio.volume = 1.0;
        
        // 尝试播放
        let playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.then(() => { isPlaying = true; })
            .catch(err => { console.log("等待交互播放"); });
        }
        
        typing();
        setInterval(createEmoji, 250);
    }

    function forcePlay() {
        const audio = document.getElementById('bgm');
        if (!isPlaying) {
            audio.play();
            isPlaying = true;
        }
    }

    function typing() {
        const msgElement = document.getElementById("msg");
        if (i < text.length) {
            if (text.substring(i, i+4) === '<br>') {
                msgElement.innerHTML += '<br>';
                i += 4;
            } else {
                msgElement.innerHTML += text.charAt(i);
                i++;
            }
            setTimeout(typing, 120);
        }
    }

    function createEmoji() {
        const emoji = document.createElement("div");
        emoji.className = "emoji";
        const icons = ["🎉","🎂","🍰","🥳","🎈","✨","🌹","💖"];
        emoji.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        emoji.style.left = (Math.random() * 90 + 5) + "%";
        const duration = Math.random() * 3 + 4;
        emoji.style.animation = `floatUp ${duration}s linear forwards`;
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), duration * 1000);
    }
</script>
</body>
</html>
